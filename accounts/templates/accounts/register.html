<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | CREDI-KART</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background:
                radial-gradient(circle at bottom right, rgba(26, 58, 95, 0.14), transparent 35%),
                linear-gradient(155deg, #fefcf0 0%, #f4ead0 100%);
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 460px;
            background: #ffffff;
            padding: 40px;
            border-radius: 18px;
            box-shadow: 0 18px 45px rgba(26, 58, 95, 0.12);
        }

        .brand {
            font-size: 30px;
            font-weight: 800;
            color: #1a3a5f;
            letter-spacing: -1px;
            text-align: center;
        }

        .brand span {
            color: #f0b400;
        }

        .subtitle {
            margin: 10px 0 28px;
            text-align: center;
            color: #5f6b7a;
            font-size: 14px;
        }

        .message {
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 14px;
            font-size: 14px;
        }

        .message.error {
            background: #fff0ee;
            border: 1px solid #ffc7c2;
            color: #b42318;
        }

        form {
            display: grid;
            gap: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #1a3a5f;
            font-size: 13px;
            font-weight: 700;
        }

        input,
        select {
            width: 100%;
            padding: 13px 14px;
            border: 2px solid #e4e7ec;
            border-radius: 10px;
            font-size: 15px;
            background: white;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #1a3a5f;
            box-shadow: 0 0 0 4px rgba(26, 58, 95, 0.12);
        }

        button {
            margin-top: 4px;
            border: none;
            border-radius: 10px;
            padding: 14px;
            background: #1a3a5f;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover {
            background: #132c49;
        }

        .footer-text {
            margin-top: 24px;
            text-align: center;
            color: #5f6b7a;
            font-size: 14px;
        }

        .footer-text a {
            color: #1a3a5f;
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">CREDI<span>KART</span></div>
        <p class="subtitle">Create your account to start using the platform</p>

        {% if messages %}
            {% for message in messages %}
                <div class="message {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div>
                <label for="username">Username</label>
                <input type="text" id="username" name="username" value="{{ request.POST.username|default:'' }}" placeholder="Choose a username" required>
            </div>

            <div>
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a strong password" required>
            </div>

            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" value="{{ request.POST.email|default:'' }}" placeholder="Enter your email address" required>
            </div>

            <div>
                <label for="phone">Phone Number</label>
                <input type="text" id="phone" name="phone" value="{{ request.POST.phone|default:'' }}" placeholder="Enter your phone number" required>
            </div>

            <div>
                <label for="user_type">Select Role</label>
                <select id="user_type" name="user_type">
                    <option value="shopkeeper" {% if request.POST.user_type == 'shopkeeper' %}selected{% endif %}>Shopkeeper</option>
                    <option value="customer" {% if request.POST.user_type != 'shopkeeper' %}selected{% endif %}>Customer</option>
                </select>
            </div>

            <button type="submit">Create Account</button>
        </form>

        <p class="footer-text">
            Already have an account? <a href="{% url 'login' %}">Login</a>
        </p>
    </div>
</body>
</html>
