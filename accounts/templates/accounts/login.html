<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREDI-KART | Login</title>
    <style>
        /* Professional UI Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            /* Light Yellowish Background */
            background-color: #fefcf0; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* The Card Container */
        .card {
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        /* Branding */
        .brand {
            font-size: 28px;
            font-weight: 800;
            color: #1a3a5f; /* Deep Blue */
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .brand span {
            color: #fbc02d; /* Credikart Yellow */
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* Django Error Message Styling */
        .error-msg {
            background-color: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            border: 1px solid #ffcdd2;
        }

        /* Form Styling */
        form {
            text-align: left;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #1a3a5f;
            margin-bottom: 6px;
            margin-left: 2px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #1a3a5f;
            box-shadow: 0 0 0 4px rgba(26, 58, 95, 0.1);
        }

        /* Submit Button */
        button {
            width: 100%;
            padding: 14px;
            background-color: #1a3a5f; /* Deep Blue */
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.1s ease;
        }

        button:hover {
            background-color: #122a46;
        }

        button:active {
            transform: scale(0.98);
        }

        /* Links */
        .footer-text {
            margin-top: 25px;
            font-size: 14px;
            color: #777;
        }

        .footer-text a {
            color: #1a3a5f;
            text-decoration: none;
            font-weight: 600;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="brand">CREDI<span>KART</span></div>
        <p class="subtitle">Secure Banking Login</p>

        {% if error %}
            <div class="error-msg">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" required>
            
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
            
            <button type="submit">Sign In</button>
        </form>

        <div class="footer-text">
            Don't have an account? <a href="/register/">Create account</a>
        </div>
    </div>

</body>
</html>
