services:
  - type: web
    name: creditkart
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: creditkart-db
          property: connectionString

databases:
  - name: creditkart-db
    plan: free
    databaseName: creditkart
